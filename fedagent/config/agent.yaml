# Agent-loop registry consumed by verl's AgentLoopManager
# (actor_rollout_ref.rollout.agent.agent_loop_config_path points here).
# Each entry maps an `agent_name` (carried on dataset rows) to its AgentLoopBase class.
- name: gym_text
  _target_: fedagent.agent_loops.gym_text_agent_loop.GymTextAgentLoop
# Faithful windowed (per-turn) variant -- has run_episode_windowed. The WindowedAgentLoopManager
# auto-maps agent_name=gym_text -> gym_text_windowed (windowed_manager._run_agent_loop), so the
# SAME env specs (agent_name: gym_text) drive both modes: concat uses the stock manager+gym_text,
# windowed uses WindowedAgentLoopManager+gym_text_windowed. Without this entry the windowed default
# crashes ("GymTextAgentLoop has no run_episode_windowed").
- name: gym_text_windowed
  _target_: fedagent.agent_loops.windowed_agent_loop.WindowedGymTextAgentLoop
