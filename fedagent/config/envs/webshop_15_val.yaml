# WebShop VALIDATION env-spec (paired with run_fed val_env_spec). The agent talks to the
# shared UNPERTURBED val service (WEBSHOP_SPLIT=val, PARTITION_STRATEGY="") which serves the
# held-out goals[0:500] on the full catalog -- the paper's WebShop test set. n_envs=500 covers
# the WHOLE held-out set (paper evaluates on all 500); seeds are deterministic (eval sets no
# FEDAGENT_BASE_SEED) so every round scores the SAME 500 val goals -> a clean round->success
# curve. 15-turn budget like train. (Reduce n_envs for a faster, biased-subsample smoke.)
envs:
  - name: WebShop
    n_envs: 500
    max_turns: 15
    agent_name: gym_text
    config:
      timeout: 180.0
