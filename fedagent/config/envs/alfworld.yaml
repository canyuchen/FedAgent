# ALFWorld env-spec. The agent drives the remote ALFWorld service (conda
# verl-agent-alfworld) via fedagent.envs.alfworld.AlfworldEnv; the per-client service URL
# comes from ALFWORLD_SERVICE_URL (set by run_fed). Concat multi-turn via gym_text agent
# loop (history is the literal chat; per-turn obs carries the current observation +
# admissible actions). max_turns=50 matches the original ALFWorld max_steps=50; the paper
# configs pair this with a widened context window (gen_paper_configs sets the ALFWorld
# client_overrides rollout.max_model_len=16384, response_length=8192), and the agent loop
# hard-guards against context overflow.
# GPU-VERIFY: confirm no OOM / prompt truncation at 50 turns; raise max_model_len if episodes
# truncate before done (50*(action+obs) can exceed 16384 on verbose rooms).
envs:
  - name: ALFWorld
    n_envs: 8
    max_turns: 50   # original ALFWorld max_steps=50 (see GPU-VERIFY note above)
    agent_name: gym_text
    config:
      timeout: 180.0
