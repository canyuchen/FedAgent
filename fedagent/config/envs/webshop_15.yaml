# WebShop env-spec at the paper's 15-step budget (vs the 6-turn smoke spec).
# Used for signal probes / real runs where the agent needs enough turns to search,
# inspect, customize, and buy. Service URL comes from WEBSHOP_SERVICE_URL.
# n_envs=8 == the original GRPO train_data_size (config/uniform/.../grpo/*.yaml:108): with
# data.train_batch_size=8 this is 1 optimizer step/epoch, so E=3 epochs => 3 local updates/round
# (matches the original). PPO uses webshop_15_ppo.yaml (n_envs=64 == original PPO train_data_size).
# Goals are drawn per (round,client) via the round-threaded FEDAGENT_BASE_SEED (run_fed), so the
# client covers its shard across rounds. (Raise for a denser per-round task sample; keep ==batch.)
envs:
  - name: WebShop
    n_envs: 8
    max_turns: 15
    agent_name: gym_text
    config:
      timeout: 180.0
