# WebShop env-spec for AgenticDataset. Each row is one episode (distinct goal via seed).
# The env is an HTTP client to the WebShop service (see fedagent/webshop_service/).
# Smoke uses small n_envs/max_turns; the research config is max_turns=15.
envs:
  - name: WebShop
    n_envs: 16
    max_turns: 6
    agent_name: gym_text
    config:
      # service URL comes from the WEBSHOP_SERVICE_URL env var (set per-client by the
      # federated runner / by the smoke launcher); not pinned here so each client can
      # talk to its own Catalog-Split service.
      timeout: 120.0
